version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: splitnest_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: splitnest
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: splitnest_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build: 
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: splitnest_api
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgres://postgres:password@postgres:5432/splitnest
      - PORT=4000
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: splitnest_web
    ports:
      - '3000:3000'
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - PORT=3000
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
